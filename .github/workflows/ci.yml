name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (Django + pytest)
    runs-on: ubuntu-latest

    services:
      # The `postgres:16-alpine` image's default credentials match what we
      # set via env in our settings.py. Port 5432 inside the container,
      # mapped to 5432 on the runner.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: playto_pay
          POSTGRES_USER: playto
          POSTGRES_PASSWORD: playto
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U playto -d playto_pay"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # DEBUG=true in CI on purpose: the production SECURE_SSL_REDIRECT we
      # set in settings.py (gated on `not DEBUG`) would redirect every
      # http://testserver/* request to https://, which Django's test client
      # cannot follow. Tests verify application correctness; the
      # production-mode security block is exercised by hand on the live
      # deploy (Render terminates TLS at the edge, so the redirect is a
      # no-op in practice there).
      DJANGO_SECRET_KEY: ci-only-secret
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      POSTGRES_DB: playto_pay
      POSTGRES_USER: playto
      POSTGRES_PASSWORD: playto
      POSTGRES_CONN_MAX_AGE: "0"
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/1

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django configuration check
        run: python manage.py check

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run pytest
        run: pytest -ra --tb=short

  frontend:
    name: Frontend (Vite build + tsc)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Type-check + production build
        run: npm run build
