services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: playto_pay
      POSTGRES_USER: playto
      POSTGRES_PASSWORD: playto
    ports:
      - "5433:5432"
    volumes:
      - playto_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playto -d playto_pay"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  playto_postgres:
